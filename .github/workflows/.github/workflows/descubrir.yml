name: Descubrimiento API
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx
      - run: python descubrir.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: descubrimiento
          path: debug/
